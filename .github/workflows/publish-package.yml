name: Publish to npmjs on release
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write       # required for npm OIDC

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compare the tag and version
        if: github.event_name == 'release'
        run: |
          NODE_VERSION=$(node -p -e "require('./package.json').version")
          LATEST_TAG=$(git describe --tags --abbrev=0)
          if [ "v$NODE_VERSION" != $LATEST_TAG ]; then echo "Github tag ($LATEST_TAG) and version ($NODE_VERSION) don't match" && exit 1; fi

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24       #  Actions will be forced to run with Node.js 24 by default starting June 16th
          registry-url: "https://registry.npmjs.org"
          scope: "@harvard-lts"

      - name: Upgrade npm
        run: npm install -g npm@latest    # ensure npm >= 11.5.1

      - name: Strip empty _authToken from .npmrc so OIDC can activate
        run: |
          for f in "$NPM_CONFIG_USERCONFIG" "$HOME/.npmrc" ./.npmrc; do
            if [ -n "$f" ] && [ -f "$f" ]; then
              echo "Stripping _authToken line from $f"
              sed -i '/_authToken=\${NODE_AUTH_TOKEN}/d' "$f"
            fi
          done

      - name: Print OIDC token issuer claim
        run: |
          TOKEN=$(curl -sSL -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=npm:registry.npmjs.org" | jq -r .value)
          PAYLOAD=$(echo "$TOKEN" | cut -d. -f2)
          # base64url -> base64 padding fix
          PAD=$(( 4 - ${#PAYLOAD} % 4 ))
          if [ "$PAD" -ne 4 ]; then PAYLOAD="$PAYLOAD$(printf '=%.0s' $(seq 1 $PAD))"; fi
          DECODED=$(echo "$PAYLOAD" | tr '_-' '/+' | base64 -d 2>/dev/null)
          echo "iss:        $(echo "$DECODED" | jq -r .iss)"
          echo "aud:        $(echo "$DECODED" | jq -r .aud)"
          echo "repository: $(echo "$DECODED" | jq -r .repository)"
          echo "repository_owner: $(echo "$DECODED" | jq -r .repository_owner)"
          echo "job_workflow_ref: $(echo "$DECODED" | jq -r .job_workflow_ref)"
          echo "enterprise: $(echo "$DECODED" | jq -r '.enterprise // "none"')"

      - name: Install dependencies
        run: npm ci

      - name: Publish to npm
        run: npm publish --access=public --provenance --loglevel=verbose
